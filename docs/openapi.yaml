# ── Components ────────────────────────────────────────────────────────────────

components:

  parameters:
    PathId:
      name: id
      in: path
      required: true
      schema:
        type: string
    FilterId:
      name: id
      in: query
      schema:
        type: string
        format: uuid
    FilterDateFrom:
      name: dateFrom
      in: query
      schema:
        type: string
        format: date-time
    FilterDateTo:
      name: dateTo
      in: query
      schema:
        type: string
        format: date-time

  schemas:

    BaseObject:
      type: object
      properties:
        updatedAt:
          type: string
          format: date-time
        updatedBy:
          type: string
          nullable: true
        isActive:
          type: boolean

    DrugCategory:
      allOf:
        - $ref: '#/components/schemas/BaseObject'
        - type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
              nullable: true
            description:
              type: string
              nullable: true

    Drug:
      allOf:
        - $ref: '#/components/schemas/BaseObject'
        - type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
              nullable: true
            genericName:
              type: string
              nullable: true
            manufacturerName:
              type: string
              nullable: true
            categoryId:
              type: string
              format: uuid
            unitOfMeasure:
              type: string
              nullable: true
            reorderLevel:
              type: integer
            brandName:
              type: string
              nullable: true
            dosageForm:
              type: string
              nullable: true
            strength:
              type: string
              nullable: true
            description:
              type: string
              nullable: true
            drugLicenseNumber:
              type: string
              nullable: true
            approvalDate:
              type: string
              format: date-time
              nullable: true
            scheduleCategory:
              type: string
              nullable: true
