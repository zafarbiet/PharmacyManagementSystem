openapi: 3.0.3
info:
  title: Pharmacy Management System API
  version: 1.0.0
  description: REST API for PharmacyManagementSystem (Indian pharmacy — GST, batch/expiry tracking, MRP-based margins)
servers:
  - url: http://localhost:5050
    description: Local dev

tags:
  - name: DrugCategories
  - name: Drugs
  - name: Vendors
  - name: AppUsers
  - name: Roles
  - name: UserRoles
  - name: StorageZones
  - name: Racks
  - name: DrugInventoryRackAssignments
  - name: ExpiryAlertConfigurations
  - name: ExpiryRecords
  - name: DisposalRecords
  - name: VendorExpiryReturnRequests
  - name: QuotationRequests
  - name: QuotationRequestItems
  - name: Quotations
  - name: QuotationItems
  - name: CustomerSubscriptions
  - name: CustomerSubscriptionItems
  - name: SubscriptionFulfillments
  - name: DebtRecords
  - name: DebtPayments
  - name: DebtReminders
  - name: DamageRecords
  - name: DamageDisposalRecords
  - name: DailyDiaryEntries
  - name: Notifications
  - name: Branches
  - name: PaymentLedger
  - name: PurchaseOrders
  - name: PurchaseOrderItems
  - name: AuditLogs
  - name: Reports

paths:

  # ── Drug Categories ──────────────────────────────────────────────────────────

  /api/drug-categories:
    get:
      tags: [DrugCategories]
      operationId: GetDrugCategories
      summary: List drug categories
      parameters:
        - $ref: '#/components/parameters/FilterId'
        - $ref: '#/components/parameters/FilterDateFrom'
        - $ref: '#/components/parameters/FilterDateTo'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DrugCategory'
    post:
      tags: [DrugCategories]
      operationId: CreateDrugCategory
      summary: Create a drug category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DrugCategory'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DrugCategory'
        '422':
          description: Validation error

  /api/drug-categories/{id}:
    parameters:
      - $ref: '#/components/parameters/PathId'
    get:
      tags: [DrugCategories]
      operationId: GetDrugCategoryById
      summary: Get drug category by ID
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DrugCategory'
        '404':
          description: Not found
    put:
      tags: [DrugCategories]
      operationId: UpdateDrugCategory
      summary: Update drug category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DrugCategory'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DrugCategory'
        '404':
          description: Not found
        '422':
          description: Validation error
    delete:
      tags: [DrugCategories]
      operationId: DeleteDrugCategory
      summary: Soft-delete drug category
      responses:
        '204':
          description: Deleted

  # ── Drugs ────────────────────────────────────────────────────────────────────

  /api/drugs:
    get:
      tags: [Drugs]
      operationId: GetDrugs
      summary: List drugs
      parameters:
        - $ref: '#/components/parameters/FilterId'
        - $ref: '#/components/parameters/FilterDateFrom'
        - $ref: '#/components/parameters/FilterDateTo'
        - name: name
          in: query
          schema:
            type: string
        - name: genericName
          in: query
          schema:
            type: string
        - name: categoryId
          in: query
          schema:
            type: string
            format: uuid
        - name: composition
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
