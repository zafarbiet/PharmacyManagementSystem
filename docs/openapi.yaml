        '404':
          description: Not found
    put:
      tags: [Drugs]
      operationId: UpdateDrug
      summary: Update drug
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Drug'
      responses:
        '200':
          description: OK
          content:
            application/json:
